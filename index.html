<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Redirect</title>

    <!-- Open Graph (OG) Meta Tags for Social Media (Facebook, Discord, WhatsApp, etc.) -->
    <meta property="og:title" content="Click to View Image" />
    <meta property="og:description" content="Click here to open the full image and content." />
    <meta property="og:image" content="https://i.imgur.com/OLbGtkO.jpeg" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://crn77.com/4/9874421" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Click to View Image">
    <meta name="twitter:description" content="Click here to open the full image and content.">
    <meta name="twitter:image" content="https://i.imgur.com/OLbGtkO.jpeg">

    <!-- Instant 0-second Redirect for Users -->
    <meta http-equiv="refresh" content="0; url=https://crn77.com/4/9874421" />

    <style>
        /* Simple styling in case the automatic redirect takes a second */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        a {
            display: block;
            max-width: 90%;
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Clickable Image Link for Users (Fallback if redirect is slow) -->
    <a href="https://crn77.com/4/9874421">
        <img src="https://i.imgur.com/OLbGtkO.jpeg" alt="Clickable Content">
    </a>

    <!-- JavaScript Fallback Redirect -->
    <script>
        window.location.href = "https://crn77.com/4/9874421";
    </script>

</body>
</html>
